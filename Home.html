<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelly - Khám phá thế giới theo cách của bạn</title>
    <link rel="stylesheet">

    <link rel="stylesheet" href="css/home.css">
</head>

<body>
    <!-- Header -->
    <header id="header">
        <a href="index.html" class="logo">Travelly</a>
        <nav class="nav">
            <ul>
                <li><a href="destinations.html">Điểm đến</a></li>
                <li><a href="booking.html">Đặt vé</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Đăng nhập</a></li>
            </ul>
            <div class="hamburger">&#9776;</div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="hero">
        <div class="hero-content">
            <h1>Khám phá thế giới theo cách của bạn</h1>
            <form class="search-bar">
                <input type="text" placeholder="Điểm đến">
                <input type="date">
                <input type="number" placeholder="Ngân sách ($)">
                <button type="submit">Tìm kiếm</button>
            </form>
        </div>
    </section>

    <!-- Trending -->
    <main>
        <section id="destinations" class="destinations">
            <div class="section-header">
                <h2>Trending</h2>

            </div>

            <div class="grid-trending">
                <div class="card tall">
                    <img src="Source/HCM.jpg" alt="Hồ Chí Minh City" class="card-img">
                    <div class="card-overlay">
                        <h3>Hồ Chí Minh City VN</h3>
                    </div>
                </div>

                <div class="card tall">
                    <img src="Source/HANOI.png" alt="Ha Noi" class="card-img">
                    <div class="card-overlay">
                        <h3>Hà Nội VN</h3>
                    </div>
                </div>

                <div class="card">
                    <img src="Source/VUNGTAU.jpg" alt="Vung Tau" class="card-img">
                    <div class="card-overlay">
                        <h3>Vũng Tàu VN</h3>
                    </div>
                </div>

                <div class="card">
                    <img src="Source/DANANG.jpg" alt="Da Nang" class="card-img">
                    <div class="card-overlay">
                        <h3>Đà Nẵng VN</h3>
                    </div>
                </div>

                <div class="card">
                    <img src="Source/DALAT.jpg" alt="Da Lat" class="card-img">
                    <div class="card-overlay">
                        <h3>Đà Lạt VN</h3>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <footer id="contact">
        <div class="footer-content">
            <p>📍 Travelly - Khám phá thế giới</p>
            <p>Email: info@travelly.com | Phone: +84 123 456 789</p>
            <div class="social">
                <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
            </div>
            <form class="newsletter">
                <input type="email" placeholder="Nhập email của bạn">
                <button>Đăng ký</button>
            </form>
        </div>
    </footer>
    <script src="js/home.js"></script>
</body>

</html>
